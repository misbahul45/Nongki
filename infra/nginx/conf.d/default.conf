upstream web_upstream {
    server web:3000;
}

upstream api_upstream {
    server api:4000;
}

upstream ai_upstream {
    server ai-engine:8000;
}

upstream rabbitmq_upstream {
    server rabbitmq:15672;
}

# Dev only — Vite HMR WebSocket upstream
upstream vite_upstream {
    server web:5173;
}

server {
    listen 80;
    server_name _;

    # ─────────────────────────────────────────
    # Fastify API — prefix /api/ is passed as-is
    # Fastify handles /api/v1/* routing internally
    # DO NOT rewrite/strip the path here
    # ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ─────────────────────────────────────────
    # AI Engine — prefix /ai/ stripped before passing
    # ─────────────────────────────────────────
    location /ai/ {
        rewrite            ^/ai/(.*) /$1 break;
        proxy_pass         http://ai_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ─────────────────────────────────────────
    # RabbitMQ Management UI — dev only
    # Access via: http://localhost/rabbitmq/
    # ─────────────────────────────────────────
    location /rabbitmq/ {
        rewrite            ^/rabbitmq/(.*) /$1 break;
        proxy_pass         http://rabbitmq_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─────────────────────────────────────────
    # Vite HMR WebSocket — dev only
    # Handles hot module replacement in dev mode
    # ─────────────────────────────────────────
    location /__vite_hmr {
        proxy_pass         http://vite_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # ─────────────────────────────────────────
    # SvelteKit Web App — catch-all
    # Must be last location block
    # For dev mode, update proxy_pass to http://vite_upstream instead of web_upstream
    # ─────────────────────────────────────────
    location / {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (SvelteKit SSE / HMR)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
